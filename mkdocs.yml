          - Dedicated Widgets:
              - MCD Dedicated: frontend/widgets/mcd_dedicated.md
              - MCD Massive Reboot: frontend/widgets/mcd_reboot.md
              - MCD Rebuild VM: frontend/widgets/mcd_rebuild_vm.md
              - MCD Massive Downtime: frontend/widgets/mcd_downtime.md

      # -------------------------------------------------------
      # Data Manager — entity configuration
      # -------------------------------------------------------
      - Data Manager:
          - Overview: frontend/data_manager/overview.md
          - Working with Entities: frontend/data_manager/working_with_entities.md
          - Tree Hierarchy View: frontend/data_manager/tree_hierarchy_view.md
          - Customers:
