site_name: XAUTOMATA Documentation
site_description: Documentation for the use of XAUTOMATA Services
site_url: https://www.xautomata.com/

theme:
  name: material
  features:
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.tooltips
    - navigation.sections
    - navigation.top
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - toc.follow
    - header.autohide

  language: en
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
      primary: blue
      accent: indigo
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
      primary: indigo
      accent: blue

repo_name: XAUTOMATA Documentation
repo_url: https://github.com/xautomata/Documentation.git

plugins:
  - mkdocstrings
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.mark
  - attr_list

nav:
  - index.md
  - Manuals:
    - Generic documentation of the XA system: info.md
    - User manual for using XA (frontend):
      - Overview: frontend/index.md

      - Getting Started:
          - Login: frontend/getting_started/login.md
          - Navigation: frontend/getting_started/navigation.md

      # -------------------------------------------------------
      # Concepts — platform architecture and data model
      # -------------------------------------------------------
      - Concepts:
          - System Overview: frontend/concepts/system_overview.md
          - Platform Models: frontend/concepts/platform_models.md
          - Monitoring Architecture: frontend/concepts/monitoring_architecture.md
          - Monitoring Lifecycle: frontend/concepts/monitoring_lifecycle.md
          - Metrics and Metric Types: frontend/concepts/metrics_model.md

      # -------------------------------------------------------
      # Dashboards — access, management and built-in dashboards
      # -------------------------------------------------------
      - Dashboards:
          - Overview: frontend/dashboards/index.md
          - Dashboard Management: frontend/dashboards/management.md
          - IT Infrastructure: frontend/dashboards/it_infrastructure.md
          - Network: frontend/dashboards/network.md
          - Cloud Cost: frontend/dashboards/cloud_cost.md

      # -------------------------------------------------------
      # Widgets — reference guide for all available widgets
      # -------------------------------------------------------
      - Widgets:
          - Overview: frontend/widgets/overview.md
          - Infrastructure Monitoring:
              - IT Infrastructure: frontend/widgets/it_infrastructure.md
              - IT Analytics: frontend/widgets/it_analytics.md
              - IT Anomalies: frontend/widgets/it_anomalies.md
          - Network Governance:
