              - Contacts: frontend/data_manager/customers/contacts.md
          - Objects Repository:
              - Groups: frontend/data_manager/objects/groups.md
              - Objects: frontend/data_manager/objects/objects.md
              - Metric Types: frontend/data_manager/objects/metric_types.md
              - Metrics: frontend/data_manager/objects/metrics.md
              - Services: frontend/data_manager/objects/services.md
          - Monitoring Operations:
              - Calendars: frontend/data_manager/monitoring/calendars.md
              - Downtimes: frontend/data_manager/monitoring/downtimes.md
              - Dispatchers: frontend/data_manager/monitoring/dispatchers.md

      # -------------------------------------------------------
